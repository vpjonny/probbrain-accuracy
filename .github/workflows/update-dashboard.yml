name: Update Accuracy Dashboard

on:
  schedule:
    # Every 2 hours, 07:00–23:00 UTC (matches scanner cadence)
    - cron: '0 7,9,11,13,15,17,19,21,23 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        env:
          POLYMARKET_API_URL: ${{ secrets.POLYMARKET_API_URL }}
        run: python run_scanner.py --output-dir data/scans
        continue-on-error: true  # don't fail deployment if Polymarket is down

      - name: Run signal detection pipeline (dry-run — no Telegram publish in CI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DUB_LINK_TELEGRAM: ${{ secrets.DUB_LINK_TELEGRAM }}
        run: python run_pipeline.py --dry-run --max-signals 5
        continue-on-error: true

      - name: Resolve closed markets
        run: python scripts/resolve_signals.py
        continue-on-error: true  # don't fail dashboard update if Polymarket is down

      - name: Update accuracy.json
        run: python -m tools.compute_accuracy

      - name: Commit and push updated dashboard data
        run: |
          git config user.name "ProbBrain Bot"
          git config user.email "bot@probbrain.com"
          git add dashboard/accuracy.json data/pending_signals.json data/resolved.json
          git diff --cached --quiet || git commit -m "chore: auto-update accuracy dashboard [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          # Pull with rebase to handle concurrent pushes from agents
          git pull --rebase origin main || true
          git push
