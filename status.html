<script>
const REFRESH_MS = 60_000;
const CADENCE_SEC = 15 * 60;

const $ = s => document.querySelector(s);
const escHtml = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function timeAgo(iso) {
  if (!iso) return '—';
  const t = new Date(iso).getTime();
  if (isNaN(t)) return '—';
  const diff = Math.max(0, Date.now() - t);
  const s = Math.round(diff / 1000);
  if (s < 60) return s + 's';
  const m = Math.round(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.round(m / 60);
  if (h < 24) return h + 'h';
  const d = Math.round(h / 24);
  if (d < 7) return d + 'd';
  if (d < 30) return Math.round(d / 7) + 'w';
  return Math.round(d / 30) + 'mo';
}
function localTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}
function ageMs(iso) { return iso ? Math.max(0, Date.now() - new Date(iso).getTime()) : Infinity; }

// Severity for cron-driven services: ok if last_run < 2× cadence, warn if 2–4×, else bad.
function freshnessLevel(iso) {
  const age = ageMs(iso);
  if (age === Infinity) return 'bad';
  if (age < 2 * CADENCE_SEC * 1000) return 'ok';
  if (age < 4 * CADENCE_SEC * 1000) return 'warn';
  return 'bad';
}

function cardHtml(c) {
  return `<div class="stat-card ${c.level}">
    <div class="top">
      <div class="name"><span class="dot ${c.level}"></span><span>${escHtml(c.icon || '')} ${escHtml(c.name)}</span></div>
      <div class="badge">${escHtml(c.badge)}</div>
    </div>
    <div class="ago num">${escHtml(c.ago)}</div>
    <div class="ago-sub">${escHtml(c.agoSub)}</div>
    <div class="metrics">
      ${c.metrics.map(m => `<div class="metric"><div class="label">${escHtml(m.label)}</div><div class="value ${m.dim ? 'dim' : ''}">${escHtml(m.value)}</div></div>`).join('')}
    </div>
  </div>`;
}

async function fetchJson(url, fallback = null) {
  try {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) return fallback;
    return await r.json();
  } catch { return fallback; }
}

function buildCards(news, opps, status, signals) {
  const cards = [];
  const now = Date.now();

  // ── Scanner ─────────────────────────────────────────
  {
    const lastRun = opps?.generated_at;
    const level = freshnessLevel(lastRun);
    const t1 = opps?.stats?.tier1_count, t2 = opps?.stats?.tier2_count, t3 = opps?.stats?.tier3_count;
    cards.push({
      level, icon: '🛰', name: 'Arbitrage scanner',
      badge: level === 'ok' ? 'Operational' : level === 'warn' ? 'Stale' : 'Down',
      ago: lastRun ? timeAgo(lastRun) : '—',
      agoSub: lastRun ? `last scan ${localTime(lastRun)}` : 'no data',
      metrics: [
        { label: 'Opportunities', value: opps?.opportunities ? String(opps.opportunities.length) : '—', dim: !opps },
        { label: 'Cadence', value: '15m', dim: true },
        { label: 'T1 / T2 / T3', value: (t1 != null ? `${t1} / ${t2} / ${t3}` : '—'), dim: t1 == null },
        { label: 'Source', value: 'opportunities.json', dim: true },
      ],
    });
  }

  // ── News fetcher ────────────────────────────────────
  {
    const lastRun = news?.generated_at;
    const level = freshnessLevel(lastRun);
    const items = news?.items || [];
    const newest = items[0];
    const lastDiscovered = newest?.discovered_at || newest?.published_at;
    const discoveredLastHour = items.filter(it => it.discovered_at && (now - new Date(it.discovered_at).getTime()) < 3600 * 1000).length;
    const sourceCount = new Set(items.map(it => it.source_id)).size;
    cards.push({
      level, icon: '📡', name: 'News fetcher',
      badge: level === 'ok' ? 'Operational' : level === 'warn' ? 'Stale' : 'Down',
      ago: lastRun ? timeAgo(lastRun) : '—',
      agoSub: lastRun ? `last fetch ${localTime(lastRun)}` : 'no data',
      metrics: [
        { label: 'Items tracked', value: String(items.length) },
        { label: 'Sources live', value: String(sourceCount) },
        { label: 'New last hour', value: String(discoveredLastHour) },
        { label: 'Newest', value: lastDiscovered ? timeAgo(lastDiscovered) + ' ago' : '—', dim: !lastDiscovered },
      ],
    });
  }

  // ── Site / dashboard ─────────────────────────────────
  {
    cards.push({
      level: 'ok', icon: '🌐', name: 'probbrain.com',
      badge: 'Operational',
      ago: 'live',
      agoSub: 'static deploy via Vercel',
      metrics: [
        { label: 'Pages', value: '/  /news  /arbitrage  /kelly  /status' },
        { label: 'CDN', value: 'Vercel Edge', dim: true },
        { label: 'Cache', value: 'JSON 300s · HTML SWR', dim: true },
        { label: 'TLS', value: 'HSTS preload', dim: true },
      ],
    });
  }

  // ── Trade signals ───────────────────────────────────
  // Signals are published opportunistically (bursty), not on a schedule —
  // so 'ok' if anything has shipped at all, 'idle' only when truly empty.
  {
    const list = Array.isArray(signals) ? signals : [];
    const posted = list.map(s => s.actually_posted_at).filter(Boolean).sort();
    const last = posted[posted.length - 1];
    const cutoff = now - 30 * 86400 * 1000;
    const recent = posted.filter(t => new Date(t).getTime() >= cutoff).length;
    const totalCount = list.length;
    const level = last ? 'ok' : 'idle';
    cards.push({
      level, icon: '📈', name: 'Trade signals',
      badge: last ? 'Published' : 'Idle',
      ago: last ? timeAgo(last) : '—',
      agoSub: last ? `last signal ${localTime(last)}` : 'no signals',
      metrics: [
        { label: 'Signals (30d)', value: String(recent) },
        { label: 'Signals total', value: String(totalCount), dim: true },
        { label: 'Channel', value: '@ProbBrain', dim: true },
        { label: 'Mirror', value: 'x.com/ProbBrain', dim: true },
      ],
    });
  }

  return cards;
}

function summarize(cards) {
  if (cards.some(c => c.level === 'bad'))  return { level: 'bad',  label: 'Service stalled' };
  if (cards.some(c => c.level === 'warn')) return { level: 'warn', label: 'One or more services quiet' };
  return { level: 'ok', label: 'All systems operational' };
}

function buildPulseStrip(cards) {
  return cards.map(c => `<div class="ps-cell ${c.level}">
    <span class="dot ${c.level}"></span>
    <span class="ps-name">${escHtml(c.name)}</span>
    <span class="ps-ago">${escHtml(c.ago)}</span>
  </div>`).join('');
}

function buildActivity(news) {
  const items = (news?.items || []).slice(0, 14);
  if (!items.length) {
    return { html: '<div class="activity-item" style="color:#666">no activity yet</div>', empty: true };
  }
  const renderOne = it => {
    const emoji = it.category_emoji || '•';
    const src = (it.source_name || '').slice(0, 22);
    const head = (it.headline || it.title || '').slice(0, 90);
    const ago = it.discovered_at ? timeAgo(it.discovered_at) : '';
    const url = '/news#' + (it.anchor || '');
    return `<a class="activity-item" href="${escHtml(url)}">
      <span class="a-emoji">${escHtml(emoji)}</span>
      <span class="a-src">${escHtml(src)}</span>
      <span class="a-sep">·</span>
      <span>${escHtml(head)}</span>
      <span class="a-sep">·</span>
      <span class="a-ago">${escHtml(ago)}</span>
    </a>`;
  };
  // Duplicate the sequence so the CSS marquee can loop seamlessly.
  const seq = items.map(renderOne).join('');
  return { html: seq + seq, empty: false };
}

async function render() {
  const [news, opps, status, signals] = await Promise.all([
    fetchJson('/news.json'),
    fetchJson('/opportunities.json'),
    fetchJson('/status.json'),
    fetchJson('/data/published_signals.json', []),
  ]);

  const cards = buildCards(news, opps, status, signals);
  $('#cards').innerHTML = cards.map(cardHtml).join('');
  $('#pulse-strip').innerHTML = buildPulseStrip(cards);

  const activity = buildActivity(news);
  const stripEl = $('#activity-strip');
  $('#activity-track').innerHTML = activity.html;
  stripEl.dataset.empty = activity.empty ? 'true' : 'false';

  const sum = summarize(cards);
  const overall = $('#overall');
  overall.className = `summary ${sum.level}`;
  overall.innerHTML = `<span class="dot ${sum.level}"></span><span>${sum.label}</span>`;

  $('#updated-ago').textContent = new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

render();
setInterval(render, REFRESH_MS);
</script>
<script src="/assets/page-pills.js" defer></script>
