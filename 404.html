<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Page not found · ProbBrain</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: dark; --bg:#0a0b14; --fg:#e8e8e8; --muted:#888; --accent:#6c8ef5; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    .card { max-width: 480px; text-align: center; }
    .code { font-size: 92px; font-weight: 200; letter-spacing: -2px; color: var(--accent); margin: 0; line-height: 1; }
    h1 { font-size: 22px; font-weight: 500; margin: 16px 0 8px; }
    p { color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a {
      color: var(--fg); text-decoration: none; padding: 9px 16px;
      border: 1px solid #2a2c3e; border-radius: 8px; font-size: 14px;
      transition: border-color .15s, background .15s;
    }
    a:hover { border-color: var(--accent); background: #16172a; }
    a.primary { background: var(--accent); border-color: var(--accent); color: #0a0b14; font-weight: 500; }
    a.primary:hover { background: #5a7be8; }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>The link you followed may be broken, or the page may have moved. Both signal records and the calculator are still where they were.</p>
    <div class="actions">
      <a class="primary" href="/">← Dashboard</a>
      <a href="/kelly">Kelly Calculator</a>
    </div>
  </main>
</body>
</html>
